<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Review Your SSS Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .review-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .review-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,60,143,0.15);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .review-header {
            background: linear-gradient(135deg, #003c8f, #1a4fa2);
            color: white;
            padding: 20px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .review-body {
            padding: 30px;
        }

        .review-section {
            margin-bottom: 30px;
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #1976d2;
        }

        .review-section-title {
            color: #003c8f;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #cfe3ff;
            padding-bottom: 10px;
        }

        .review-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .review-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .review-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .review-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #003c8f;
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #cfe3ff;
            word-break: break-word;
        }

        .review-value.empty {
            color: #999;
            font-style: italic;
        }

        .review-signatures {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .signature-preview {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #cfe3ff;
        }

        .signature-preview h4 {
            color: #003c8f;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .signature-image {
            max-width: 100%;
            max-height: 60px;
            border: 1px dashed #003c8f;
            padding: 5px;
            background: white;
            margin: 10px 0;
        }

        .officials-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .officials-table th {
            background: #003c8f;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 0.9rem;
        }

        .officials-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .officials-table tr:last-child td {
            border-bottom: none;
        }

        .official-signature-small {
            max-width: 80px;
            max-height: 30px;
        }

        .granting-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #cfe3ff;
        }

        .granting-preview img {
            max-width: 300px;
            max-height: 70px;
            margin-bottom: 10px;
        }

        .granting-preview .name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #003c8f;
        }

        .granting-preview .date {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .email-preview {
            background: #e8f5e9;
            border: 2px solid #4CAF50;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .email-icon {
            font-size: 2.5rem;
        }

        .email-details {
            flex: 1;
        }

        .email-details .label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
        }

        .email-details .address {
            font-size: 1.2rem;
            font-weight: 600;
            color: #003c8f;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #003c8f;
            color: white;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-complete {
            background: #4CAF50;
            color: white;
        }

        .status-incomplete {
            background: #f44336;
            color: white;
        }

        @media (max-width: 768px) {
            .review-grid {
                grid-template-columns: 1fr;
            }
            
            .review-signatures {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="review-container" id="reviewContainer">
        <div class="loading">Loading form data...</div>
    </div>

    <script>
        // Get data from localStorage
        function loadFormData() {
            const form1Data = JSON.parse(localStorage.getItem('firstFormData') || '{}');
            
            // Get form2 data from inputs if available
            const form2Data = {
                registeredName: document.getElementById('registeredName')?.value || '',
                idNumber: document.getElementById('idNumber')?.value || '',
                companyAddress: document.getElementById('companyAddress')?.value || '',
                telNumber: document.getElementById('telNumber')?.value || '',
                
                officialName1: document.getElementById('officialName1')?.value || '',
                officialDesignation1: document.getElementById('officialDesignation1')?.value || '',
                officialInitial1: document.getElementById('officialInitial1')?.value || '',
                officialSignature1: document.getElementById('officialSignature1')?.toDataURL() || '',
                
                officialName2: document.getElementById('officialName2')?.value || '',
                officialDesignation2: document.getElementById('officialDesignation2')?.value || '',
                officialInitial2: document.getElementById('officialInitial2')?.value || '',
                officialSignature2: document.getElementById('officialSignature2')?.toDataURL() || '',
                
                officialName3: document.getElementById('officialName3')?.value || '',
                officialDesignation3: document.getElementById('officialDesignation3')?.value || '',
                officialInitial3: document.getElementById('officialInitial3')?.value || '',
                officialSignature3: document.getElementById('officialSignature3')?.toDataURL() || '',
                
                grantingName: document.getElementById('grantingName')?.value || '',
                grantingSignature: document.getElementById('grantingSignature')?.toDataURL() || '',
                grantingDate: document.getElementById('grantingDate')?.value || '',
                recipientEmail: document.getElementById('recipientEmail')?.value || ''
            };
            
            return { form1Data, form2Data };
        }

        // Check if canvas has signature
        function hasSignature(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return false;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            return imageData.data.some(pixel => pixel !== 0);
        }

        // Generate review HTML
        function generateReviewHTML() {
            const { form1Data, form2Data } = loadFormData();
            
            // Check signature status
            const sig1 = hasSignature('officialSignature1');
            const sig2 = hasSignature('officialSignature2');
            const sig3 = hasSignature('officialSignature3');
            const grantingSig = hasSignature('grantingSignature');
            
            const allSignaturesComplete = sig1 && sig2 && sig3 && grantingSig;
            
            return `
                <div class="review-card">
                    <div class="review-header">
                        <span>📋</span> REVIEW YOUR FORM
                        <span class="status-badge ${allSignaturesComplete ? 'status-complete' : 'status-incomplete'}">
                            ${allSignaturesComplete ? '✓ ALL COMPLETE' : '⚠️ INCOMPLETE'}
                        </span>
                    </div>
                    
                    <div class="review-body">
                        <!-- FORM 1 SECTION -->
                        <div class="review-section">
                            <div class="review-section-title">
                                <span>🏢</span> COMPANY REPRESENTATIVE AUTHORIZATION
                            </div>
                            
                            <div class="review-grid">
                                <div class="review-item">
                                    <span class="review-label">Employer Name</span>
                                    <span class="review-value ${!form1Data.employerName ? 'empty' : ''}">
                                        ${form1Data.employerName || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">Employer ID No.</span>
                                    <span class="review-value ${!form1Data.employerId ? 'empty' : ''}">
                                        ${form1Data.employerId || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">Address</span>
                                    <span class="review-value ${!form1Data.address ? 'empty' : ''}">
                                        ${form1Data.address || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">Telephone No.</span>
                                    <span class="review-value ${!form1Data.telephone ? 'empty' : ''}">
                                        ${form1Data.telephone || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">Certified Person</span>
                                    <span class="review-value ${!form1Data.certName ? 'empty' : ''}">
                                        ${form1Data.certName || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">SS Number</span>
                                    <span class="review-value ${!form1Data.ssNumber ? 'empty' : ''}">
                                        ${form1Data.ssNumber || 'Not provided'}
                                    </span>
                                </div>
                            </div>
                            
                            <div class="review-signatures">
                                <div class="signature-preview">
                                    <h4>SPECIMEN SIGNATURE</h4>
                                    ${form1Data.specimenSignature1 ? 
                                        `<img src="${form1Data.specimenSignature1}" class="signature-image">` : 
                                        '<div class="review-value empty">No signature</div>'}
                                    <div class="review-value">${form1Data.specimenName1 || ''}</div>
                                </div>
                                
                                <div class="signature-preview">
                                    <h4>SIGNATURE OVER PRINTED NAME</h4>
                                    ${form1Data.employerSignature ? 
                                        `<img src="${form1Data.employerSignature}" class="signature-image">` : 
                                        '<div class="review-value empty">No signature</div>'}
                                    <div class="review-value">${form1Data.employerName2 || ''}</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- FORM 2 SECTION -->
                        <div class="review-section">
                            <div class="review-section-title">
                                <span>📝</span> SPECIMEN SIGNATURE CARD
                            </div>
                            
                            <div class="review-grid">
                                <div class="review-item">
                                    <span class="review-label">Registered Employer Name</span>
                                    <span class="review-value ${!form2Data.registeredName ? 'empty' : ''}">
                                        ${form2Data.registeredName || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">I.D. No.</span>
                                    <span class="review-value ${!form2Data.idNumber ? 'empty' : ''}">
                                        ${form2Data.idNumber || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">Address</span>
                                    <span class="review-value ${!form2Data.companyAddress ? 'empty' : ''}">
                                        ${form2Data.companyAddress || 'Not provided'}
                                    </span>
                                </div>
                                
                                <div class="review-item">
                                    <span class="review-label">Tel. No.</span>
                                    <span class="review-value ${!form2Data.telNumber ? 'empty' : ''}">
                                        ${form2Data.telNumber || 'Not provided'}
                                    </span>
                                </div>
                            </div>
                            
                            <h4 style="color: #003c8f; margin: 20px 0 10px;">Authorized Officials</h4>
                            
                            <table class="officials-table">
                                <tr>
                                    <th>Name</th>
                                    <th>Designation</th>
                                    <th>Initial</th>
                                    <th>Signature</th>
                                </tr>
                                <tr>
                                    <td>${form2Data.officialName1 || 'Not provided'}</td>
                                    <td>${form2Data.officialDesignation1 || 'Not provided'}</td>
                                    <td>${form2Data.officialInitial1 || 'Not provided'}</td>
                                    <td>
                                        ${form2Data.officialSignature1 ? 
                                            `<img src="${form2Data.officialSignature1}" class="official-signature-small">` : 
                                            'No signature'}
                                    </td>
                                </tr>
                                <tr>
                                    <td>${form2Data.officialName2 || 'Not provided'}</td>
                                    <td>${form2Data.officialDesignation2 || 'Not provided'}</td>
                                    <td>${form2Data.officialInitial2 || 'Not provided'}</td>
                                    <td>
                                        ${form2Data.officialSignature2 ? 
                                            `<img src="${form2Data.officialSignature2}" class="official-signature-small">` : 
                                            'No signature'}
                                    </td>
                                </tr>
                                <tr>
                                    <td>${form2Data.officialName3 || 'Not provided'}</td>
                                    <td>${form2Data.officialDesignation3 || 'Not provided'}</td>
                                    <td>${form2Data.officialInitial3 || 'Not provided'}</td>
                                    <td>
                                        ${form2Data.officialSignature3 ? 
                                            `<img src="${form2Data.officialSignature3}" class="official-signature-small">` : 
                                            'No signature'}
                                    </td>
                                </tr>
                            </table>
                            
                            <h4 style="color: #003c8f; margin: 20px 0 10px;">Granting Authority</h4>
                            
                            <div class="granting-preview">
                                ${form2Data.grantingSignature ? 
                                    `<img src="${form2Data.grantingSignature}" alt="Granting Signature">` : 
                                    '<div class="review-value empty">No signature</div>'}
                                <div class="name">${form2Data.grantingName || 'Not provided'}</div>
                                <div class="date">${form2Data.grantingDate ? 'Date: ' + form2Data.grantingDate : ''}</div>
                            </div>
                            
                            <div class="email-preview">
                                <div class="email-icon">📧</div>
                                <div class="email-details">
                                    <div class="label">RECIPIENT EMAIL</div>
                                    <div class="address">${form2Data.recipientEmail || 'No email provided'}</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn btn-secondary" onclick="window.location.href='register.html'">
                                <span>←</span> BACK TO EDIT
                            </button>
                            
                            <button class="btn btn-primary" onclick="proceedToSubmit()">
                                PROCEED TO SUBMIT ✓
                            </button>
                        </div>
                        
                        <p style="text-align: center; color: #666; font-size: 0.85rem; margin-top: 20px;">
                            Please review all information carefully before submitting.
                        </p>
                    </div>
                </div>
            `;
        }

        function proceedToSubmit() {
            if (confirm('Are you ready to submit this form? An email will be sent with the QR code.')) {
                window.location.href = 'register.html?action=submit';
            }
        }

        // Display review
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('reviewContainer').innerHTML = generateReviewHTML();
        });
    </script>
</body>
</html>
