<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SSS Form Summary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .summary-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,60,143,0.15);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .card-header {
            background: linear-gradient(135deg, #003c8f, #1a4fa2);
            color: white;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 3px solid #ffd700;
        }

        .card-body {
            padding: 25px;
        }

        .header-with-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .logo-left {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-left img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 1.8rem;
            color: #003c8f;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .header-text .branch {
            color: #1976d2;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-text .address {
            color: #666;
            font-size: 0.9rem;
        }

        .republic-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .republic-text {
            flex: 1;
        }

        .republic-text h2 {
            font-size: 1.8rem;
            color: #003c8f;
            text-transform: uppercase;
        }

        .republic-text h3 {
            font-size: 1.4rem;
            color: #1976d2;
            margin: 5px 0;
        }

        .republic-text .form-number {
            color: #666;
            font-size: 0.9rem;
            font-style: italic;
        }

        .company-info-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            flex: 1;
        }

        .info-table td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
        }

        .info-table td:first-child {
            font-weight: 600;
            color: #003c8f;
            width: 180px;
            background: #f8f9ff;
        }

        .photo-container {
            width: 150px;
            text-align: center;
            flex-shrink: 0;
        }

        .photo-label {
            font-size: 0.85rem;
            color: #003c8f;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            border: 3px solid #003c8f;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);

        .photo-frame img {
            width: 100%;
            height: 100%;

        .photo-placeholder {

            height: 100%;

            align-items: center;
            justify-content: center;

            font-size: 0.8rem;

            font-size: 0.95rem;

        .signature-grid {

        .signature-box {

            border-radius: 5px;

        .noted-label {

            margin-bottom: 5px;
        }

        .noted-title {

            font-style: italic;

        .granting-section {

            text-align: center;
        }

        .granting-container {

            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.3);
        }

        .loading, .error-message {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            font-size: 1.2rem;
        }

        .loading {

<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading data from cloud...</div>
    </div>

    <script>
        if (!firebase.apps.length) {
            const firebaseConfig = {
                apiKey: "AIzaSyCfQTN7UTRcW9lBm-rhRqyAOcT5gFZDJIs",
                authDomain: "sss-qr-system-39b59.firebaseapp.com",
                projectId: "sss-qr-system-39b59",
                storageBucket: "sss-qr-system-39b59.firebasestorage.app",
                messagingSenderId: "81090026028",
                appId: "1:81090026028:web:91dfd833462e2d95434f89"
            };
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase initialized");
        } else {
            console.log("✅ Firebase already initialized");
        }
        
        const db = firebase.firestore();

        window.onload = function() {
            displaySummary();
        };

        async function displaySummary() {
            const container = document.getElementById('summaryContainer');
            
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('id');
            
            if (!submissionId) {
                container.innerHTML = '<div class="error-message">❌ No submission ID found</div>';
                return;
            }

            try {
                const docRef = db.collection('sss-submissions').doc(submissionId);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    container.innerHTML = '<div class="error-message">❌ Submission not found</div>';
                    return;
                }

                const data = docSnap.data();
                
                console.log("🔥 DATA FROM FIREBASE:", data);
                
                let html = '';
                
                html += '<div class="verified-badge"><span>✓ VERIFIED CLOUD DATA</span></div>';
                
                html += '<div class="form-card">';
                html += '<div class="card-header">COMPANY REPRESENTATIVE AUTHORIZATION CARD</div>';
                html += '<div class="card-body">';
                
                html += '<div class="header-with-logo">';
                html += '<div class="logo-left">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.innerHTML=\'SSS\';">';
                html += '</div>';
                html += '<div class="header-text">';
                html += '<h1>Social Security System</h1>';
                html += '<div class="branch">EASTWOOD BRANCH</div>';
                html += '<div class="address">187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>';
                html += '</div>';
                html += '</div>';
                
                html += '<div class="company-info-section">';
                
                html += '<table class="info-table">';
                html += '<tr><td>EMPLOYER NAME:</td><td>' + (data.employerName || 'N/A') + '</td></tr>';
                html += '<tr><td>EMPLOYER ID NO.:</td><td>' + (data.employerId || 'N/A') + '</td></tr>';
                html += '<tr><td>ADDRESS:</td><td>' + (data.address || 'N/A') + '</td></tr>';
                html += '<tr><td>TELEPHONE NO.:</td><td>' + (data.telephone || 'N/A') + '</td></tr>';
                html += '</table>';
                
                html += '<div class="photo-container">';
                html += '<div class="photo-label">1x1 PHOTO</div>';
                html += '<div class="photo-frame">';
                if (data.photo && data.photo !== '#' && data.photo !== '') {
                    html += `<img src="${data.photo}" alt="1x1 Photo">`;
                } else {
                    html += '<div class="photo-placeholder">No image</div>';
                }
                html += '</div>';
                html += '</div>';
                
                html += '</div>'; 
                
                html += '<div class="certification-text">';
                html += '<p>This is to certify that Mr./Ms. <strong>' + (data.certName || 'N/A') + '</strong> with SS # <strong>' + (data.ssNumber || 'N/A') + '</strong>, whose specimen signatures / initials appear below, is authorized to transact, verify and file Employer Data Change Request (R-8), Employer Registration Form (R-1), Employment Report (R-1A) and Member Data Change Request (E-4) of herein company\'s employees.</p>';
                html += '<p>This Certification shall be valid within one (1) year from the date of issuance unless otherwise revoked and the SSS Eastwood Branch duly notified.</p>';
                html += '</div>';
                
                html += '<div class="signature-grid">';
                
                if (data.specimenSignature1) {
                    html += '<div class="signature-box">';
                    html += '<h4>SPECIMEN SIGNATURE</h4>';
                    html += `<img src="${data.specimenSignature1}" class="signature-img">`;
                    html += '<div class="signature-name">' + (data.specimenName1 || '') + '</div>';
                    html += '</div>';
                }
                
                if (data.employerSignature) {
                    html += '<div class="signature-box">';
                    html += '<h4>SIGNATURE OVER PRINTED NAME</h4>';
                    html += `<img src="${data.employerSignature}" class="signature-img">`;
                    html += '<div class="signature-name">' + (data.employerName2 || data.employerName || '') + '</div>';
                    html += '</div>';
                }
                
                html += '</div>';
                
                html += '<div class="noted-section">';
                html += '<div class="noted-label">Noted by:</div>';
                html += '<div class="noted-line"></div>';
                html += '<div class="noted-name">ELEANOR F. DEATO</div>';
                html += '<div class="noted-title">Branch Head</div>';
                html += '</div>';
                
                html += '</div></div>'; 
                
                html += '<div class="form-card">';
                html += '<div class="card-header">SPECIMEN SIGNATURE CARD</div>';
                html += '<div class="card-body">';
                
                html += '<div class="republic-header">';
                html += '<div class="logo-left">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.innerHTML=\'SSS\';">';
                html += '</div>';
                html += '<div class="republic-text">';
                html += '<h2>Republic of the Philippines</h2>';
                html += '<h3>SOCIAL SECURITY SYSTEM</h3>';
                html += '<div class="form-number">SSS Form L - 501 (07-94)</div>';
                html += '</div>';
                html += '</div>';
                
                html += '<table class="info-table">';
                html += '<tr>';
                html += '<td>Registered Employer Name:</td>';
                html += '<td>' + (data.registeredName || data.employerName || 'N/A') + '</td>';
                html += '</tr>';
                html += '<tr>';
                html += '<td>I.D. No.:</td>';
                html += '<td>' + (data.idNumber || data.employerId || 'N/A') + '</td>';
                html += '</tr>';
                html += '<tr>';
                html += '<td>Address:</td>';
