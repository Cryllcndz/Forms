<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>SSS Form Summary</title>
    <link rel="stylesheet" href="form.css">
       
 <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e9ecef;
            padding: 10px;
        }

        .summary-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,60,143,0.15);
            overflow: hidden;
            border: 2px solid #003c8f;
        }

        .card-body {
            padding: 15px;
        }

        /* Header styling - responsive */
        .header-with-logo {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 12px !important;
            margin-bottom: 15px !important;
            padding-bottom: 12px !important;
            border-bottom: 2px solid #003c8f !important;
            flex-wrap: wrap !important;
        }

        .logo-container {
            flex-shrink: 0 !important;
        }

        .logo-container img {
            width: 60px !important;
            height: auto !important;
            margin-bottom: 0 !important;
        }

        .sss-header {
            text-align: left;
        }

        .sss-header h1 {
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 3px 0;
            color: #003c8f;
        }

        .branch {
            font-size: 11px;
            font-weight: bold;
            color: #b22234;
            margin: 3px 0;
        }

        .address, .tel {
            font-size: 9px;
            color: #555;
            margin: 1px 0;
        }

        /* Republic header styling - responsive */
        .republic-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid #003c8f;
            flex-wrap: wrap;
        }

        .republic-text {
            text-align: left;
        }

        .republic-text h2 {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 3px 0;
            color: #003c8f;
        }

        .republic-text h3 {
            font-size: 12px;
            font-weight: bold;
            margin: 0 0 3px 0;
            color: #003c8f;
        }

        .republic-text .form-number {
            font-size: 9px;
            color: #555;
            margin-top: 2px;
        }

        /* Form title styling */
        .form-title {
            text-align: center;
            margin: 10px 0 15px 0;
        }

        .form-title h2 {
            font-size: 14px;
            font-weight: bold;
            color: #003c8f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Company info section - responsive */
        .company-info-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .info-table td {
            padding: 8px 10px;
            border: 1px solid #003c8f;
            font-size: 11px;
        }

        .info-table td:first-child {
            font-weight: 600;
            color: #003c8f;
            width: 35%;
            background: #f8f9ff;
            font-size: 11px;
        }

        .photo-container {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-label {
            font-size: 10px;
            color: #003c8f;
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .photo-frame {
            width: 100px;
            height: 100px;
            border: 2px solid #003c8f;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 10px;
            background: #f5f5f5;
        }

        /* Certification text - responsive */
        .certification-text {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 3px solid #1976d2;
            font-size: 10px;
            line-height: 1.5;
        }

        .certification-text p {
            margin-bottom: 8px;
            text-align: justify;
        }

        /* Signature grid - responsive */
        .signature-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin: 12px 0;
        }

        .signature-box {
            text-align: center;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .signature-box h4 {
            color: #003c8f;
            margin-bottom: 8px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .signature-img {
            max-width: 100%;
            max-height: 50px;
            margin: 8px 0;
            border: 1px dashed #003c8f;
            padding: 3px;
            background: white;
        }

        .signature-name {
            color: #003c8f;
            font-weight: 600;
            padding: 5px;
            background: white;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
            font-size: 10px;
        }

        /* Officials table - responsive */
        .officials-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 10px;
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .officials-table th {
            background: #003c8f;
            color: white;
            padding: 8px 5px;
            text-transform: uppercase;
            border: 1px solid #003c8f;
            font-size: 10px;
            white-space: nowrap;
        }

        .officials-table td {
            border: 1px solid #003c8f;
            padding: 8px 5px;
            text-align: center;
            font-size: 10px;
        }

        .official-signature-img {
            max-width: 60px;
            max-height: 30px;
        }

        /* Noted section - responsive */
        .noted-section {
            margin-top: 15px;
            text-align: center;
            padding: 12px;
            background: #f0f7ff;
            border-radius: 8px;
        }

        .noted-label {
            font-weight: 600;
            color: #003c8f;
            margin-bottom: 3px;
            text-align: center;
            font-size: 11px;
        }

        .noted-line {
            width: 150px;
            height: 1px;
            background: #003c8f;
            margin: 5px auto 10px auto;
        }

        .noted-name {
            font-size: 12px;
            font-weight: 700;
            color: #003c8f;
            margin-bottom: 3px;
        }

        .noted-title {
            color: #666;
            font-size: 10px;
            font-style: italic;
        }

        /* Granting section - responsive */
        .granting-section {
            margin-top: 12px;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 8px;
            border: 1px solid #cfe3ff;
        }

        .granting-title {
            color: #003c8f;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .granting-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .granting-signature-img {
            max-width: 180px;
            max-height: 60px;
            margin-bottom: 10px;
            border: 2px solid #003c8f;
            padding: 6px;
            background: white;
            border-radius: 6px;
        }

        .granting-name {
            font-size: 11px;
            font-weight: 600;
            color: #003c8f;
            margin: 5px 0;
            padding: 6px 10px;
            background: white;
            border-radius: 5px;
            border: 1px solid #1976d2;
            width: 100%;
            text-align: center;
        }

        .granting-label {
            font-size: 9px;
            color: #666;
            margin-top: 3px;
            font-style: italic;
        }

        .granting-date {
            margin-top: 6px;
            color: #666;
            font-size: 10px;
        }

        .verified-badge {
            text-align: center;
            margin-bottom: 15px;
        }

        .verified-badge span {
            background: #4caf50;
            color: white;
            padding: 5px 20px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            font-size: 11px;
        }

        .timestamp {
            text-align: center;
            color: #888;
            font-size: 9px;
            margin: 10px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .print-btn {
            background: #003c8f;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 12px;
            border-radius: 40px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
            font-weight: bold;
        }

        .loading, .error-message {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            font-size: 14px;
        }

        .loading {
            color: #003c8f;
        }

        .error-message {
            color: #f44336;
        }

        /* Tablet view */
        @media (min-width: 600px) {
            body {
                padding: 15px;
            }
            
            .company-info-section {
                flex-direction: row;
                gap: 20px;
            }
            
            .photo-container {
                width: 120px;
            }
            
            .photo-frame {
                width: 110px;
                height: 110px;
            }
            
            .signature-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .header-with-logo {
                gap: 20px !important;
            }
            
            .logo-container img {
                width: 70px !important;
            }
            
            .sss-header h1 {
                font-size: 18px;
            }
            
            .branch {
                font-size: 12px;
            }
            
            .address, .tel {
                font-size: 10px;
            }
            
            .form-title h2 {
                font-size: 16px;
            }
        }

        /* Desktop view */
        @media (min-width: 900px) {
            body {
                padding: 20px;
            }
            
            .logo-container img {
                width: 80px !important;
            }
            
            .sss-header h1 {
                font-size: 20px;
            }
            
            .branch {
                font-size: 14px;
            }
            
            .address, .tel {
                font-size: 12px;
            }
            
            .republic-text h2 {
                font-size: 18px;
            }
            
            .republic-text h3 {
                font-size: 16px;
            }
            
            .form-title h2 {
                font-size: 18px;
            }
            
            .info-table td {
                font-size: 12px;
                padding: 10px 12px;
            }
            
            .officials-table {
                display: table;
            }
            
            .officials-table th, .officials-table td {
                font-size: 11px;
                padding: 10px;
            }
        }

     @media print {

    .sss-header h1 {

    }
}

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading data from cloud...</div>
    </div>

    <script>
        if (!firebase.apps.length) {
            const firebaseConfig = {
                apiKey: "AIzaSyCfQTN7UTRcW9lBm-rhRqyAOcT5gFZDJIs",
                authDomain: "sss-qr-system-39b59.firebaseapp.com",
                projectId: "sss-qr-system-39b59",
                storageBucket: "sss-qr-system-39b59.firebasestorage.app",
                messagingSenderId: "81090026028",
                appId: "1:81090026028:web:91dfd833462e2d95434f89"
            };
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase initialized");
        }
        
        const db = firebase.firestore();

        window.onload = function() {
            displaySummary();
        };

        async function displaySummary() {
            const container = document.getElementById('summaryContainer');
            
            const urlParams = new URLSearchParams(window.location.search);
            const submissionId = urlParams.get('id');
            
            if (!submissionId) {
                container.innerHTML = '<div class="error-message">❌ No submission ID found</div>';
                return;
            }

            try {
                const docRef = db.collection('sss-submissions').doc(submissionId);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    container.innerHTML = '<div class="error-message">❌ Submission not found</div>';
                    return;
                }

                const data = docSnap.data();
                
                console.log("🔥 DATA FROM FIREBASE:", data);
                
                let html = '';
                
                html += '<div class="verified-badge"><span>✓ VERIFIED CLOUD DATA</span></div>';
                
                // FORM 1 - COMPANY REPRESENTATIVE AUTHORIZATION CARD
                html += '<div class="form-card">';
                html += '<div class="card-body">';
                
                html += '<div class="header-with-logo">';
                html += '<div class="logo-container">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.style.display=\'none\';">';
                html += '</div>';
                html += '<div class="sss-header">';
                html += '<h1>Social Security System</h1>';
                html += '<div class="branch">EASTWOOD BRANCH</div>';
                html += '<div class="address">187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>';
                html += '<div class="tel">Tel. Nos.: 8351-1605; 8351-1623</div>';
                html += '</div>';
                html += '</div>';
                
                html += '<div class="form-title">';
                html += '<h2>COMPANY REPRESENTATIVE AUTHORIZATION CARD</h2>';
                html += '</div>';
                
                html += '<div class="company-info-section">';
                html += '<table class="info-table">';
                html += '运转<td>EMPLOYER NAME:<\/td><td>' + (data.employerName || 'N/A') + '<\/td><\/tr>';
                html += '鱼塘<td>EMPLOYER ID NO.:<\/td><td>' + (data.employerId || 'N/A') + '<\/td><\/tr>';
                html += '鱼塘<td>ADDRESS:<\/td><td>' + (data.address || 'N/A') + '<\/td><\/tr>';
                html += '鱼塘<td>TELEPHONE NO.:<\/td><td>' + (data.telephone || 'N/A') + '<\/td><\/tr>';
                html += '<\/table>';
                
                html += '<div class="photo-container">';
                html += '<div class="photo-label">PHOTO 1x1</div>';
                html += '<div class="photo-frame">';
                if (data.photo && data.photo !== '#' && data.photo !== '') {
                    html += '<img src="' + data.photo + '" alt="1x1 Photo">';
                } else {
                    html += '<div class="photo-placeholder">No image</div>';
                }
                html += '</div>';
                html += '</div>';
                html += '</div>';
                
                html += '<div class="certification-text">';
                html += '<p>This is to certify that Mr./Ms. <strong>' + (data.certName || 'N/A') + '</strong> with SS # <strong>' + (data.ssNumber || 'N/A') + '</strong>, whose specimen signatures / initials appear below, is authorized to transact, verify and file Employer Data Change Request (R-8), Employer Registration Form (R-1), Employment Report (R-1A) and Member Data Change Request (E-4) of herein company\'s employees.</p>';
                html += '<p>This Certification shall be valid within one (1) year from the date of issuance unless otherwise revoked and the SSS Eastwood Branch duly notified.</p>';
                html += '</div>';
                
                html += '<div class="signature-grid">';
                if (data.specimenSignature1) {
                    html += '<div class="signature-box">';
                    html += '<h4>SPECIMEN SIGNATURE</h4>';
                    html += '<img src="' + data.specimenSignature1 + '" class="signature-img">';
                    html += '<div class="signature-name">' + (data.specimenName1 || '') + '</div>';
                    html += '</div>';
                }
                if (data.employerSignature) {
                    html += '<div class="signature-box">';
                    html += '<h4>SIGNATURE OVER PRINTED NAME</h4>';
                    html += '<img src="' + data.employerSignature + '" class="signature-img">';
                    html += '<div class="signature-name">' + (data.employerName2 || data.employerName || '') + '</div>';
                    html += '</div>';
                }
                html += '</div>';
                
                html += '<div class="noted-section">';
                html += '<div class="noted-label">Noted by:</div>';
                html += '<div class="noted-line"></div>';
                html += '<div class="noted-name">ELEANOR F. DEATO</div>';
                html += '<div class="noted-title">Branch Head</div>';
                html += '</div>';
                
                html += '</div></div>';
                
                // FORM 2 - SPECIMEN SIGNATURE CARD
                html += '<div class="form-card">';
                html += '<div class="card-body">';
                
                html += '<div class="republic-header">';
                html += '<div class="logo-container">';
                html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.style.display=\'none\';">';
                html += '</div>';
                html += '<div class="republic-text">';
                html += '<h2>Republic of the Philippines</h2>';
                html += '<h3>SOCIAL SECURITY SYSTEM</h3>';
                html += '<div class="form-number">SSS Form L - 501 (07-94)</div>';
                html += '</div>';
                html += '</div>';
                
                html += '<div class="form-title">';
                html += '<h2>SPECIMEN SIGNATURE CARD</h2>';
                html += '</div>';
                
                html += '<table class="info-table">';
                html += '鱼塘<td>Registered Employer Name:<\/td><td>' + (data.registeredName || data.employerName || 'N/A') + '<\/td><\/tr>';
                html += '鱼塘<td>I.D. No.:<\/td><td>' + (data.idNumber || data.employerId || 'N/A') + '<\/td><\/tr>';
                html += '鱼塘<td>Address:<\/td><td>' + (data.companyAddress || data.address || 'N/A') + '<\/td><\/tr>';
                html += '鱼塘<td>Tel. No.:<\/td><td>' + (data.telNumber || data.telephone || 'N/A') + '<\/td><\/tr>';
                html += '<\/table>';
                
                html += '<h3 style="color:#003c8f; margin:12px 0 8px; text-align:center;">Authorized Officials</h3>';
                html += '<div style="overflow-x: auto;">';
                html += '<table class="officials-table">';
                html += '<tr><th>Printed Name</th><th>Designation</th><th>Initial</th><th>Signature</th><\/tr>';
                
                for (let i = 1; i <= 3; i++) {
                    if (data['officialName' + i] || data['officialSignature' + i]) {
                        html += '<tr>';
                        html += '<td>' + (data['officialName' + i] || '') + '<\/td>';
                        html += '<td>' + (data['officialDesignation' + i] || '') + '<\/td>';
                        html += '<td>' + (data['officialInitial' + i] || '') + '<\/td>';
                        html += '<td>';
                        if (data['officialSignature' + i]) {
                            html += '<img src="' + data['officialSignature' + i] + '" class="official-signature-img">';
                        } else {
                            html += 'No signature';
                        }
                        html += '<\/td>';
                        html += '<\/tr>';
                    }
                }
                html += '<\/table>';
                html += '<\/div>';
                
                if (data.grantingName || data.grantingSignature) {
                    html += '<div class="granting-section">';
                    html += '<div class="granting-title">Name and official capacity of person granting authority</div>';
                    html += '<div class="granting-container">';
                    if (data.grantingSignature) {
                        html += '<img src="' + data.grantingSignature + '" class="granting-signature-img" alt="Granting Signature">';
                    }
                    html += '<div class="granting-name">' + (data.grantingName || 'N/A') + '</div>';
                    html += '<div class="granting-label">(Please sign over printed name.)</div>';
                    if (data.grantingDate) {
                        html += '<div class="granting-date">Date authority granted: ' + data.grantingDate + '</div>';
                    }
                    html += '</div>';
                    html += '</div>';
                }
                
                html += '</div></div>';
                
                if (data.timestamp) {
                    html += '<div class="timestamp">Generated: ' + new Date(data.timestamp).toLocaleString() + '</div>';
                }
                
                html += '<button class="print-btn" onclick="window.print()">PRINT FORM</button>';
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="error-message">❌ Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
