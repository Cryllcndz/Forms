<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SSS Form Summary</title>
    <link rel="stylesheet" href="form.css">
       
 <style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e9ecef;
    padding: 20px;
    overflow-x: hidden; /* avoid horizontal scroll */
}

/* SUMMARY CONTAINER */
.summary-container {
    width: 100%;
    max-width: 100%; /* full width for mobile */
    padding: 10px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* FORM CARD */
.form-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,60,143,0.15);
    overflow: hidden;
    border: 2px solid #003c8f;
    width: 100%;
    box-sizing: border-box;
}

/* CARD HEADER */
.card-header {
    background: #003c8f;
    color: white;
    padding: 15px 25px;
    font-size: 1.3rem;
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 2px solid #ffd700;
    text-align: center;
}

/* CARD BODY */
.card-body {
    padding: 25px;
}

/* HEADER WITH LOGO */
.header-with-logo {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 20px !important;
    margin-bottom: 20px !important;
    padding-bottom: 15px !important;
    border-bottom: 2px solid #003c8f !important;
}

.logo-container img {
    width: 80px !important;
    height: 70px !important;
}

/* SSS HEADER */
.sss-header h1 {
    font-size: 20px;
    font-weight: bold;
    color: #003c8f;
}

.branch, .address, .tel {
    margin: 2px 0;
    color: #555;
}

/* REPUBLIC HEADER */
.republic-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #003c8f;
}

.republic-text h2, .republic-text h3 {
    color: #003c8f;
}

/* FORM TITLE */
.form-title h2 {
    font-size: 18px;
    font-weight: bold;
    color: #003c8f;
    text-transform: uppercase;
    text-align: center;
}

/* COMPANY INFO SECTION */
.company-info-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
}

.info-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 1rem;
    flex: 1;
}

.info-table td {
    padding: 12px 15px;
    border: 1px solid #003c8f;
}

.info-table td:first-child {
    font-weight: 600;
    color: #003c8f;
    width: 180px;
    background: #f8f9ff;
}

/* PHOTO */
.photo-container {
    width: 150px;
    text-align: center;
    flex-shrink: 0;
}

.photo-label {
    font-size: 0.85rem;
    color: #003c8f;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
}

.photo-frame {
    width: 150px;
    height: 150px;
    border: 3px solid #003c8f;
    border-radius: 8px;
    overflow: hidden;
    background: #f0f0f0;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CERTIFICATION TEXT */
.certification-text {
    background: #f8f9ff;
    padding: 20px;
    border-radius: 8px;
    margin: 15px 0;
    border-left: 4px solid #1976d2;
    font-size: 0.95rem;
    line-height: 1.6;
}

.certification-text p {
    margin-bottom: 10px;
    text-align: justify;
}

.certification-text strong {
    color: #003c8f;
}

/* SIGNATURE GRID */
.signature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 20px 0;
}

.signature-box {
    text-align: center;
    padding: 20px;
    background: #f8f9ff;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
}

.signature-box h4 {
    color: #003c8f;
    margin-bottom: 15px;
    font-size: 1rem;
    text-transform: uppercase;
}

.signature-img {
    max-width: 100%;
    max-height: 70px;
    margin: 10px 0;
    border: 1px dashed #003c8f;
    padding: 5px;
    background: white;
}

.signature-name {
    color: #003c8f;
    font-weight: 600;
    padding: 8px;
    background: white;
    border-radius: 5px;
    border: 1px solid #e0e0e0;
}

/* OFFICIALS TABLE */
.officials-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
}

.officials-table th, .officials-table td {
    border: 1px solid #003c8f;
    padding: 12px;
    text-align: left;
    vertical-align: middle;
    word-break: break-word;
}

.official-signature-img {
    max-width: 100px;
    max-height: 45px;
}

/* NOTED SECTION */
.noted-section {
    margin-top: 25px;
    text-align: flex;
    padding: 20px;
    background: #f0f7ff;
    border-radius: 8px;
}

.noted-label {
    font-weight: 600;
    color: #003c8f;
    margin-bottom: 8px;
    text-align: flex;
}

.noted-line {
    width: 250px;
    height: 1px;
    background: #003c8f;
}

.noted-name {
    font-size: 1.2rem;
    font-weight: 600;
    color: #003c8f;
    margin-top: 8px;
    margin-bottom: 3px;
}

.noted-title {
    color: #666;
    font-size: 1rem;
    font-style: italic;
    margin-top: 0;
}

/* GRANTING SECTION */
.granting-section {
    margin-top: 20px;
    padding: 20px;
    background: #f8f9ff;
    border-radius: 8px;
    border: 1px solid #cfe3ff;
}

/* GENERAL FORM CONTAINER FOR INPUTS */
.form-container {
    width: 100%;
    padding: 10px;
}

.form-container input,
.form-container textarea,
.form-container select {
    width: 100%;
    padding: 8px;
    margin-bottom: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.form-container label {
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
    font-size: 14px;
}

/* SIGNATURE INPUTS */
.signature-section {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

.signature-wrapper {
    flex: 1 1 48%;
    min-width: 200px;
}

/* PHOTO INPUT */
.photo-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
}

.photo-section img {
    max-width: 100%;
    height: auto;
    border: 1px solid #003c8f;
    border-radius: 4px;
}

/* BUTTONS */
.form-container button {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    background: #003c8f;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* MOBILE - COMPANY REPRESENTATIVE AUTHORIZATION CARD */
@media screen and (max-width: 768px) {
    
    /* Company info section */
    .company-info-section {
        flex-direction: column;
        gap: 15px;
        align-items: center;
    }
    
    /* Employer info table */
    .company-info-section > div:first-child {
        overflow-x: auto;
        width: 100%;
    }
    
    .company-info-section table {
        min-width: 400px;
        width: 100%;
        border-collapse: collapse;
    }
    
    .company-info-section td {
        padding: 8px 10px;
        font-size: 12px;
        border: 1px solid #003c8f;
    }
    
    .company-info-section td:first-child {
        background: #003c8f;
        color: white;
        font-weight: 600;
        width: 140px;
        white-space: nowrap;
    }
    
    .company-info-section td:last-child {
        background: white;
        color: #1a2c3e;
        word-break: break-word;
    }
    
    /* Photo - CENTERED */
    .photo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin: 5px 0;
    }
    
    .photo-frame {
        width: 100px;
        height: 100px;
        margin: 0 auto;
        border: 2px solid #003c8f;
        border-radius: 8px;
        overflow: hidden;
        background: #f0f0f0;
    }
    
    .photo-label {
        font-size: 11px;
        text-align: center;
        margin-bottom: 6px;
    }
    
    /* Certification text */
    .certification-text {
        font-size: 11px;
        padding: 12px;
        margin: 12px 0;
        line-height: 1.5;
    }
    
    /* Signatures */
    .signature-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 12px 0;
    }
    
    .signature-box {
        padding: 12px;
        width: 100%;
    }
    
    .signature-img {
        max-height: 50px;
    }
    
    /* Noted section */
    .noted-section {
        margin-top: 15px;
        padding: 12px;
    }
    
    .noted-line {
        width: 150px;
        margin: 5px auto;
    }
}

/* EXTRA SMALL PHONES */
@media screen and (max-width: 480px) {
    
    .company-info-section table {
        min-width: 350px;
    }
    
    .company-info-section td {
        padding: 6px 8px;
        font-size: 11px;
    }
    
    .company-info-section td:first-child {
        width: 120px;
        font-size: 10px;
    }
    
    .photo-frame {
        width: 85px;
        height: 85px;
    }
    
    .photo-label {
        font-size: 10px;
    }
    
    .certification-text {
        font-size: 10px;
        padding: 10px;
    }
    
    .certification-text p {
        margin-bottom: 6px;
    }
    
    /* Signatures */
    .signature-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 12px 0;
    }
    
    .signature-box {
        padding: 12px;
        width: 100%;
    }
    
    .signature-box h4 {
        font-size: 12px;
        margin-bottom: 8px;
    }
    
    .signature-img {
        max-height: 50px;
        margin: 6px auto;
    }
    
    .signature-name {
        font-size: 11px;
        padding: 5px;
    }
    
    /* Noted section */
    .noted-section {
        margin-top: 15px;
        padding: 12px;
    }
    
    .noted-label {
        font-size: 12px;
        margin-bottom: 5px;
    }
    
    .noted-line {
        width: 150px;
        margin: 5px auto;
    }
    
    .noted-name {
        font-size: 13px;
        margin-top: 5px;
    }
    
    .noted-title {
        font-size: 10px;
    }
}

/* EXTRA SMALL PHONES */
@media screen and (max-width: 480px) {
    
    /* Employer info table */
    .company-info-section table {
        min-width: 350px;
    }
    
    .company-info-section td {
        padding: 6px 8px;
        font-size: 11px;
    }
    
    .company-info-section td:first-child {
        width: 120px;
        font-size: 10px;
    }
    
    .company-info-section td:last-child {
        font-size: 11px;
    }
    
    /* Photo */
    .photo-frame {
        width: 85px;
        height: 85px;
    }
    
    .photo-label {
        font-size: 10px;
    }
    
    /* Certification text */
    .certification-text {
        font-size: 10px;
        padding: 10px;
    }
    
    /* Signatures */
    .signature-box h4 {
        font-size: 11px;
    }
    
    .signature-img {
        max-height: 45px;
    }
    
    .signature-name {
        font-size: 10px;
    }
    
    /* Noted section */
    .noted-name {
        font-size: 12px;
    }
    
    .noted-title {
        font-size: 9px;
    }
    
    .noted-line {
        width: 120px;
    }
}
</style>

</head>
<body>
    <div class="summary-container" id="summaryContainer">
        <div class="loading">Loading data from cloud...</div>
    </div>

    <script>
        if (!firebase.apps.length) {
            const firebaseConfig = {
                apiKey: "AIzaSyCfQTN7UTRcW9lBm-rhRqyAOcT5gFZDJIs",
                authDomain: "sss-qr-system-39b59.firebaseapp.com",
                projectId: "sss-qr-system-39b59",
                storageBucket: "sss-qr-system-39b59.firebasestorage.app",
                messagingSenderId: "81090026028",
                appId: "1:81090026028:web:91dfd833462e2d95434f89"
            };
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase initialized");
        }
        
        const db = firebase.firestore();

        window.onload = function() {
            displaySummary();
        };

        async function displaySummary() {
    const container = document.getElementById('summaryContainer');
    
    const urlParams = new URLSearchParams(window.location.search);
    const submissionId = urlParams.get('id');
    
    if (!submissionId) {
        container.innerHTML = '<div class="error-message">❌ No submission ID found</div>';
        return;
    }

    try {
        const docRef = db.collection('sss-submissions').doc(submissionId);
        const docSnap = await docRef.get();

        if (!docSnap.exists) {
            container.innerHTML = '<div class="error-message">❌ Submission not found</div>';
            return;
        }

        const data = docSnap.data();
        
        console.log("🔥 DATA FROM FIREBASE:", data);
        
        let html = '';
        
        html += '<div class="verified-badge"><span>✓ VERIFIED CLOUD DATA</span></div>';
        
        html += '<div class="form-card">';
        html += '<div class="card-body">';
        
        html += '<div class="header-with-logo">';
        html += '<div class="logo-container">';
        html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.style.display=\'none\';">';
        html += '</div>';
        html += '<div class="sss-header">';
        html += '<h1>Social Security System</h1>';
        html += '<div class="branch">EASTWOOD BRANCH</div>';
        html += '<div class="address">187 ABQ Building, E. Rodriguez Jr. Ave., Bagumbayan, QC</div>';
        html += '<div class="tel">Tel. Nos.: 8351-1605; 8351-1623</div>';
        html += '</div>';
        html += '</div>';
        
        html += '<div class="form-title">';
        html += '<h2>COMPANY REPRESENTATIVE AUTHORIZATION CARD</h2>';
        html += '</div>';
        
        html += '<div class="company-info-section">';
        html += '<table class="info-table">';
        html += '<tr><td>EMPLOYER NAME:</td><td>' + (data.employerName || 'N/A') + '</td></tr>';
        html += '<tr><td>EMPLOYER ID NO.:</td><td>' + (data.employerId || 'N/A') + '</td></tr>';
        html += '<tr><td>ADDRESS:</td><td>' + (data.address || 'N/A') + '</td></tr>';
        html += '<tr><td>TELEPHONE NO.:</td><td>' + (data.telephone || 'N/A') + '</td></tr>';
        html += '</table>';
        
        html += '<div class="photo-container">';
        html += '<div class="photo-label">PHOTO 1x1</div>';
        html += '<div class="photo-frame">';
        if (data.photo && data.photo !== '#' && data.photo !== '') {
            html += '<img src="' + data.photo + '" alt="1x1 Photo">';
        } else {
            html += '<div class="photo-placeholder">No image</div>';
        }
        html += '</div>';
        html += '</div>';
        html += '</div>';
        
        html += '<div class="certification-text">';
        html += '<p>This is to certify that Mr./Ms. <strong>' + (data.certName || 'N/A') + '</strong> with SS # <strong>' + (data.ssNumber || 'N/A') + '</strong>, whose specimen signatures / initials appear below, is authorized to transact, verify and file Employer Data Change Request (R-8), Employer Registration Form (R-1), Employment Report (R-1A) and Member Data Change Request (E-4) of herein company\'s employees.</p>';
        html += '<p>This Certification shall be valid within one (1) year from the date of issuance unless otherwise revoked and the SSS Eastwood Branch duly notified.</p>';
        html += '</div>';
        
        html += '<div class="signature-grid">';
        if (data.specimenSignature1) {
            html += '<div class="signature-box">';
            html += '<h4>SPECIMEN SIGNATURE</h4>';
            html += '<img src="' + data.specimenSignature1 + '" class="signature-img">';
            html += '<div class="signature-name">' + (data.specimenName1 || '') + '</div>';
            html += '</div>';
        }
        if (data.employerSignature) {
            html += '<div class="signature-box">';
            html += '<h4>SIGNATURE OVER PRINTED NAME</h4>';
            html += '<img src="' + data.employerSignature + '" class="signature-img">';
            html += '<div class="signature-name">' + (data.employerName2 || data.employerName || '') + '</div>';
            html += '</div>';
        }
        html += '</div>';
        
        html += '<div class="noted-section">';
        html += '<div class="noted-label">Noted by:</div>';
        html += '<div class="noted-line"></div>';
        html += '<div class="noted-name">ELEANOR F. DEATO</div>';
        html += '<div class="noted-title">Branch Head</div>';
        html += '</div>';
        
        html += '</div></div>';
        
        html += '<div class="form-card">';
        html += '<div class="card-body">';
        
        html += '<div class="republic-header">';
        html += '<div class="logo-container">';
        html += '<img src="republic-of-the-philippines-social-security-system-logo-png_seeklogo.png" alt="SSS Logo" onerror="this.style.display=\'none\';">';
        html += '</div>';
        html += '<div class="republic-text">';
        html += '<h2>Republic of the Philippines</h2>';
        html += '<h3>SOCIAL SECURITY SYSTEM</h3>';
        html += '<div class="form-number">SSS Form L - 501 (07-94)</div>';
        html += '</div>';
        html += '</div>';
        
        html += '<div class="form-title">';
        html += '<h2>SPECIMEN SIGNATURE CARD</h2>';
        html += '</div>';
        
        html += '<table class="info-table">';
        html += '<tr>';
        html += '<td style="width: 180px; background: #f8f9ff; font-weight: 600; color: #003c8f;">Registered Employer Name:</td>';
        html += '<td>' + (data.registeredName || data.employerName || 'N/A') + '</td>';
        html += '</tr>';
        html += '<tr>';
        html += '<td style="width: 180px; background: #f8f9ff; font-weight: 600; color: #003c8f;">I.D. No.:</td>';
        html += '<td>' + (data.idNumber || data.employerId || 'N/A') + '</td>';
        html += '</tr>';
        html += '<tr>';
        html += '<td style="width: 180px; background: #f8f9ff; font-weight: 600; color: #003c8f;">Address:</td>';
        html += '<td>' + (data.companyAddress || data.address || 'N/A') + '</td>';
        html += '</tr>';
        html += '<tr>';
        html += '<td style="width: 180px; background: #f8f9ff; font-weight: 600; color: #003c8f;">Tel. No.:</td>';
        html += '<td>' + (data.telNumber || data.telephone || 'N/A') + '</td>';
        html += '</tr>';
        html += '</table>';
        
        html += '<h3 style="color:#003c8f; margin:20px 0 12px; text-align:center;">Authorized Officials</h3>';
        html += '<div style="overflow-x: auto; width: 100%;">';
        html += '<table class="officials-table" style="width: 100%; border-collapse: collapse;">';
        html += '<thead>';
        html += '<tr style="background:#003c8f; color:white;">';
        html += '<th style="padding: 12px; border: 1px solid #003c8f; text-align: center;">Printed Name</th>';
        html += '<th style="padding: 12px; border: 1px solid #003c8f; text-align: center;">Designation</th>';
        html += '<th style="padding: 12px; border: 1px solid #003c8f; text-align: center;">Initial</th>';
        html += '<th style="padding: 12px; border: 1px solid #003c8f; text-align: center;">Signature</th>';
        html += '</tr>';
        html += '</thead>';
        html += '<tbody>';
        
        for (let i = 1; i <= 3; i++) {
            const officialName = data['officialName' + i];
            const officialDesignation = data['officialDesignation' + i];
            const officialInitial = data['officialInitial' + i];
            const officialSignature = data['officialSignature' + i];
            
            if (officialName || officialSignature) {
                html += '<tr>';
                html += '<td style="padding: 12px; border: 1px solid #003c8f; word-break: break-word;">' + (officialName || '') + '</td>';
                html += '<td style="padding: 12px; border: 1px solid #003c8f; word-break: break-word;">' + (officialDesignation || '') + '</td>';
                html += '<td style="padding: 12px; border: 1px solid #003c8f; word-break: break-word;">' + (officialInitial || '') + '</td>';
                html += '<td style="padding: 12px; border: 1px solid #003c8f; text-align: center;">';
                if (officialSignature) {
                    html += '<img src="' + officialSignature + '" class="official-signature-img" style="max-width:100px; max-height:45px;">';
                } else {
                    html += 'No signature';
                }
                html += '</td>';
                html += '</tr>';
            }
        }
        
        html += '</tbody>';
        html += '</table>';
        html += '</div>';
        
        if (data.grantingName || data.grantingSignature) {
            html += '<div class="granting-section">';
            html += '<div class="granting-title">Name and official capacity of person granting authority</div>';
            html += '<div class="granting-container">';
            if (data.grantingSignature) {
                html += '<img src="' + data.grantingSignature + '" class="granting-signature-img" alt="Granting Signature">';
            }
            html += '<div class="granting-name">' + (data.grantingName || 'N/A') + '</div>';
            html += '<div class="granting-label">(Please sign over printed name.)</div>';
            if (data.grantingDate) {
                html += '<div class="granting-date">Date authority granted: ' + data.grantingDate + '</div>';
            }
            html += '</div>';
            html += '</div>';
        }
        
        html += '</div></div>';
        
        if (data.timestamp) {
            html += '<div class="timestamp">Generated: ' + new Date(data.timestamp).toLocaleString() + '</div>';
        }
        
        html += '<button class="print-btn" onclick="window.print()">PRINT FORM</button>';
        
        container.innerHTML = html;
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = '<div class="error-message">❌ Error: ' + error.message + '</div>';
    }
}
    </script>
</body>
</html>
